{% extends 'base.html' %}
{% block title %}Delete Task{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h2 class="mb-0">Confirm Task Deletion</h2>
                </div>
                <div class="card-body">
                    <p class="fs-5">Are you sure you want to delete the task:</p>
                    <p class="fw-bold fs-4">"{{ task.title }}"?</p>
                    <p class="text-muted">From project: <strong>{{ project.name }}</strong></p>
                    <p class="text-danger"><strong>Warning:</strong> This action cannot be undone.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">Yes, Delete Task</button>
                            <a href="{% url 'core:task_detail' task.pk %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'core:home' %}">Home</a></li>
                    <li class="breadcrumb-item"><a href="{% url 'core:project_list' %}">Projects</a></li>
                    <li class="breadcrumb-item active">{{ action }} Project</li>
                </ol>
            </nav>
            <div class="card">
                <div class="card-header">
                    <h2 class="mb-0">{{ title }}</h2>
                </div>
                <div class="card-body">
                    <!-- CSRF token is REQUIRED for all POST forms -->
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label fw-semibold">
                                {{ field.label }}{% if field.field.required %} <span class="text-danger">*</span>{% endif %}
                            </label>
                            {{ field }}
                            <!-- {% if field.help_text %}
                                <div class="form-text">{{ field.help_text }}</div>
                            {% endif %} -->
                            <!-- {% for error in field.errors %}
                                <div class="invalid-feedback d-block">{{ error }}</div>
                            {% endfor %} -->
                        </div>
                        {% endfor %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">{{ action }} Project</button>
                            {% if project %}
                                <a href="{% url 'core:project_detail' project.pk %}" class="btn btn-secondary">Cancel</a>
                            {% else %}
                                <a href="{% url 'core:project_list' %}" class="btn btn-secondary">Cancel</a>
                            {% endif %}
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
